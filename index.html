<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Siniestros - MARA</title>
    <!-- Bootstrap 5 para un diseño moderno y responsivo en celulares -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-top: 30px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.05); max-width: 700px; margin: 0 auto; }
        .form-header { border-bottom: 2px solid #eef2f3; padding-bottom: 15px; margin-bottom: 25px; }
        .btn-submit { background-color: #2ecc71; color: white; border: none; font-weight: bold; padding: 12px; }
        .btn-submit:hover { background-color: #27ae60; color: white; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="form-container">
        <div class="form-header text-center">
            <h2 class="text-primary fw-bold">Registro de Siniestros</h2>
            <p class="text-muted small">Base de Datos Operativa - MARA</p>
        </div>

        <!-- REEMPLAZA EL URL ABAJO CON TU NUEVO ENLACE DE /exec -->
        <form id="formularioSiniestros" action="https://script.google.com/macros/s/AKfycbxywyqA3VCLLhKz8YYq0ffh_EElE7e-LmAXQUD1ST77CfoQtnB88CT_IyJtAVLMSFkt/exec">
            
            <div class="row g-3">
                <!-- Fecha -->
                <div class="col-md-6">
                    <label for="fecha" class="form-label fw-semibold">Fecha</label>
                    <input type="date" id="fecha" name="fecha" class="form-control" required>
                </div>

                <!-- Siniestro -->
                <div class="col-md-6">
                    <label for="siniestro" class="form-label fw-semibold">Número de Siniestro</label>
                    <input type="text" id="siniestro" name="siniestro" class="form-control" placeholder="Ej. 0185633724 o 185633724" pattern="[0-9]{9,10}" title="El siniestro debe tener 9 o 10 dígitos numéricos" maxlength="10" required>
                </div>

                <!-- N/C (Normal o Complemento) -->
                <div class="col-md-6">
                    <label for="nc" class="form-label fw-semibold">Tipo (N/C)</label>
                    <select id="nc" name="nc" class="form-select" required>
                        <option value="" disabled selected>Selecciona una opción...</option>
                        <option value="1">1.0 - Normal</option>
                        <option value="2">2.0 - Complemento</option>
                    </select>
                </div>

                <!-- Póliza -->
                <div class="col-md-6">
                    <label for="poliza" class="form-label fw-semibold">Póliza</label>
                    <input type="text" id="poliza" name="poliza" class="form-control" required>
                </div>

                <!-- Cobertura -->
                <div class="col-md-6">
                    <label for="cobertura" class="form-label fw-semibold">Cobertura</label>
                    <input type="text" id="cobertura" name="cobertura" class="form-control" required>
                </div>

                <!-- Compañía (Cia) -->
                <div class="col-md-6">
                    <label for="cia" class="form-label fw-semibold">Cia (Abreviatura)</label>
                    <input type="text" id="cia" name="cia" class="form-control" placeholder="Ej. QBE, ABA" required>
                </div>

                <!-- Tipo de Servicio -->
                <div class="col-md-6">
                    <label for="tipo" class="form-label fw-semibold">Tipo de Servicio</label>
                    <input type="text" id="tipo" name="tipo" class="form-control" required>
                </div>

                <hr class="my-4 text-muted">
                <h5 class="text-secondary fw-bold mt-0">Tiempos y Asignación</h5>

                <!-- Asigna -->
                <div class="col-md-3 col-6">
                    <label for="asigna" class="form-label small fw-semibold">Hora Asigna</label>
                    <input type="time" id="asigna" name="asigna" class="form-control" required>
                </div>

                <!-- Confirma -->
                <div class="col-md-3 col-6">
                    <label for="confirma" class="form-label small fw-semibold">Hora Confirma</label>
                    <input type="time" id="confirma" name="confirma" class="form-control" required>
                </div>

                <!-- Llega -->
                <div class="col-md-3 col-6">
                    <label for="llega" class="form-label small fw-semibold">Hora Llega</label>
                    <input type="time" id="llega" name="llega" class="form-control" required>
                </div>

                <!-- Término -->
                <div class="col-md-3 col-6">
                    <label for="termino" class="form-label small fw-semibold">Hora Término</label>
                    <input type="time" id="termino" name="termino" class="form-control" required>
                </div>
            </div>

            <!-- Botón de Envío -->
            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-submit btn-lg rounded-pill shadow-sm">Guardar Registro en MARA</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Configura la fecha de hoy por defecto en el formulario para ahorrar tiempo al capturar
    document.addEventListener('DOMContentLoaded', () => {
        const hoy = new Date().toISOString().split('T')[0];
        document.getElementById('fecha').value = hoy;
    });

    // Envío controlado mediante AJAX para evitar que la página se quede en blanco o redirija feo
    const form = document.getElementById('formularioSiniestros');
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = form.querySelector('.btn-submit');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = 'Guardando registro...';

        fetch(form.action, {
            method: 'POST',
            body: new FormData(form)
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                alert('¡Siniestro guardado con éxito en la fila ' + data.fila + '!');
                form.reset();
                // Reestablece la fecha de hoy tras limpiar el formulario
                document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
            } else {
                alert('Hubo un problema al guardar. Inténtalo de nuevo.');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('¡Registro enviado con éxito!'); // Fallback si hay bloqueos de CORS menores
            form.reset();
            document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = originalText;
        });
    });
</script>
</body>
</html>
