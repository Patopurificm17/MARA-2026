<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Siniestros - MARA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-top: 20px; font-family: 'Segoe UI', sans-serif; }
        .form-container { background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto; }
        .form-header { border-bottom: 2px solid #eef2f3; padding-bottom: 10px; margin-bottom: 20px; }
        .section-title { background: #eef2f3; padding: 6px 12px; border-radius: 6px; font-weight: bold; color: #495057; margin-top: 15px; margin-bottom: 15px; }
        .btn-submit { background-color: #2ecc71; color: white; border: none; font-weight: bold; padding: 12px; }
        .btn-submit:hover { background-color: #27ae60; color: white; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="form-container">
        <div class="form-header text-center">
            <h2 class="text-primary fw-bold">Registro de Siniestros</h2>
            <p class="text-muted small">Base de Datos Operativa - MARA</p>
        </div>

        <!-- REEMPLAZA ESTE LINK CON TU NUEVA URL GENERADA DE APPS SCRIPT -->
        <form id="formularioSiniestros" action="https://script.google.com/macros/s/AKfycbxi3IbDRhnmp_tKY0MPkNmZNgweJ5DXej4O6_3b2b96ZSqN2ylfxm4lcVyeN0RDgJD8nA/exec">
            
            <div class="section-title">Datos Generales del Siniestro</div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Fecha</label>
                    <input type="date" id="fecha" name="fecha" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Número de Siniestro</label>
                    <input type="text" id="siniestro" name="siniestro" class="form-control" maxlength="10" placeholder="Ej. 0185633724" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Tipo (N/C)</label>
                    <select name="nc" class="form-select" required>
                        <option value="" disabled selected>Selecciona...</option>
                        <option value="1">1.0 - Normal</option>
                        <option value="2">2.0 - Complemento</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Póliza</label>
                    <input type="text" name="poliza" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Cobertura</label>
                    <input type="text" name="cobertura" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Segmentación</label>
                    <input type="text" name="segmentacion" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Cia (Abreviatura)</label>
                    <input type="text" name="cia" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Compañía (Completo)</label>
                    <input type="text" name="compania" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Declaración</label>
                    <textarea name="declaracion" class="form-control" rows="2"></textarea>
                </div>
            </div>

            <div class="section-title">Afectaciones y Estatus</div>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Daños NA</label>
                    <input type="text" name="danosNa" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Daños 3RO</label>
                    <input type="text" name="danos3ro" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Grúa</label>
                    <input type="text" name="grua" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Responsabilidad</label>
                    <input type="text" name="responsabilidad" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Tipo de Servicio</label>
                    <input type="text" name="tipo" class="form-control" required>
                </div>
            </div>

            <div class="section-title">Montos y Finanzas</div>
            <div class="row g-3">
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Sipac R</label><input type="number" step="0.01" name="sipacR" class="form-control"></div>
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Sipac E</label><input type="number" step="0.01" name="sipacE" class="form-control"></div>
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Trad R</label><input type="number" step="0.01" name="tradR" class="form-control"></div>
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Trad E</label><input type="number" step="0.01" name="tradE" class="form-control"></div>
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Rec</label><input type="number" step="0.01" name="rec" class="form-control"></div>
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Efectivo</label><input type="number" step="0.01" name="efectivo" class="form-control"></div>
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Tarjeta</label><input type="number" step="0.01" name="tarjeta" class="form-control"></div>
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Rechazo</label><input type="text" name="rechazo" class="form-control"></div>
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Verificaciones</label><input type="text" name="verificaciones" class="form-control"></div>
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">PP</label><input type="text" name="pp" class="form-control"></div>
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Médico</label><input type="text" name="medico" class="form-control"></div>
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Clínica</label><input type="text" name="clinica" class="form-control"></div>
            </div>

            <div class="section-title">Tiempos y Observaciones</div>
            <div class="row g-3">
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Hora Asigna</label><input type="time" name="asigna" class="form-control" required></div>
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Hora Confirma</label><input type="time" name="confirma" class="form-control" required></div>
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Hora Llega</label><input type="time" name="llega" class="form-control" required></div>
                <div class="col-md-3 col-6"><label class="form-label small fw-semibold">Hora Término</label><input type="time" name="termino" class="form-control" required></div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Observaciones</label>
                    <textarea name="observaciones" class="form-control" rows="2"></textarea>
                </div>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-submit btn-lg rounded-pill shadow-sm">Guardar Registro en MARA</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
    });

    const form = document.getElementById('formularioSiniestros');
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = form.querySelector('.btn-submit');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = 'Guardando...';

        fetch(form.action, { method: 'POST', body: new FormData(form) })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                alert('¡Siniestro guardado con éxito!');
                form.reset();
                document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
            } else { alert('Error al guardar.'); }
        })
        .catch(error => {
            alert('¡Registro enviado!'); 
            form.reset();
            document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
        })
        .finally(() => { btn.disabled = false; btn.innerHTML = originalText; });
    });
</script>
</body>
</html>
