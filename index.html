<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Siniestros - MARA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-top: 20px; font-family: 'Segoe UI', sans-serif; }
        .form-container { background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.05); max-width: 850px; margin: 0 auto; }
        .form-header { border-bottom: 2px solid #eef2f3; padding-bottom: 10px; margin-bottom: 25px; }
        .btn-submit { background-color: #2ecc71; color: white; border: none; font-weight: bold; padding: 12px; }
        .btn-submit:hover { background-color: #27ae60; color: white; }
        /* Fuerza mayúsculas visuales en los campos de texto indicados */
        .uppercase-input { text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="form-container">
        <div class="form-header text-center">
            <h2 class="text-primary fw-bold">Registro de Siniestros</h2>
            <p class="text-muted small">Base de Datos Operativa - MARA</p>
        </div>

        <form id="formularioSiniestros" action="https://script.google.com/macros/s/AKfycbwiyeLGpBoKDeeRx6i1dfNM1vUfotyp_w3hRBSL42ltiuZbxC59IK4-fX7VvDe4ch6NVw/exec" method="POST">
            
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label fw-semibold">1. Siniestro</label>
                    <input type="text" id="siniestro" name="siniestro" class="form-control" inputmode="numeric" pattern="[0-9]{9,10}" maxlength="10" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">2. Fecha</label>
                    <input type="date" id="fecha" name="fecha" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">3. N/C</label>
                    <select name="nc" class="form-select" required>
                        <option value="" disabled selected>Selecciona...</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">4. Póliza</label>
                    <input type="text" name="poliza" class="form-control" inputmode="numeric" pattern="[0-9]+" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">5. Cobertura</label>
                    <select name="cobertura" class="form-select" required>
                        <option value="" disabled selected>Selecciona...</option>
                        <option value="AMPLIA">AMPLIA</option>
                        <option value="LIMITADA">LIMITADA</option>
                        <option value="RC">RC</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">6. Daños NA</label>
                    <input type="number" step="0.01" name="danosNa" class="form-control" inputmode="decimal">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">7. Daños 3RO</label>
                    <input type="number" step="0.01" name="danos3ro" class="form-control" inputmode="decimal">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">8. Declaración</label>
                    <input type="text" name="declaracion" class="form-control uppercase-input">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">9. Segmentación</label>
                    <input type="text" name="segmentacion" class="form-control uppercase-input">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">10. Grúa</label>
                    <input type="text" name="grua" class="form-control" inputmode="numeric" pattern="[0-9]+">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">11. Responsabilidad</label>
                    <select name="responsabilidad" class="form-select">
                        <option value="" disabled selected>Selecciona...</option>
                        <option value="ASEGURADO">ASEGURADO</option>
                        <option value="TERCERO">TERCERO</option>
                        <option value="COMPARTIDA">COMPARTIDA</option>
                        <option value="INDEFINIDA">INDEFINIDA</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">12. Cia</label>
                    <select name="cia" class="form-select" required>
                        <option value="" disabled selected>Selecciona...</option>
                        <option value="S">S</option>
                        <option value="N">N</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">13. Compañía</label>
                    <input type="text" name="compania" class="form-control uppercase-input">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">14. SIPAC R</label>
                    <select name="sipacR" class="form-select">
                        <option value="" selected>Nada</option>
                        <option value="1">1</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">15. SIPAC E</label>
                    <input type="number" step="0.01" name="sipacE" class="form-control" inputmode="decimal">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">16. Trad. R</label>
                    <select name="tradR" class="form-select">
                        <option value="" selected>Nada</option>
                        <option value="1">1</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">17. Trad. E</label>
                    <input type="number" step="0.01" name="tradE" class="form-control" inputmode="decimal">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">18. Rec.</label>
                    <select name="rec" class="form-select">
                        <option value="" selected>Nada</option>
                        <option value="1">1</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">19. Efectivo</label>
                    <input type="number" step="0.01" name="efectivo" class="form-control" inputmode="decimal">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">20. Tarjeta</label>
                    <input type="number" step="0.01" name="tarjeta" class="form-control" inputmode="decimal">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">21. Rechazo</label>
                    <select name="rechazo" class="form-select">
                        <option value="" selected>Nada</option>
                        <option value="1">1</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">22. Verificaciones</label>
                    <select name="verificaciones" class="form-select">
                        <option value="" selected>Nada</option>
                        <option value="1">1</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">23. PP</label>
                    <input type="number" step="0.01" name="pp" class="form-control" inputmode="decimal">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">24. Medico</label>
                    <select name="medico" class="form-select">
                        <option value="" selected>Nada</option>
                        <option value="1">1</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">25. Clinica</label>
                    <select name="clinica" class="form-select">
                        <option value="" selected>Nada</option>
                        <option value="1">1</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">26. Observaciones</label>
                    <input type="text" name="observaciones" class="form-control uppercase-input">
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">27. Tipo</label>
                    <select name="tipo" class="form-select" required>
                        <option value="" disabled selected>Selecciona...</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </div>

                <div class="col-md-3 col-6">
                    <label class="form-label small fw-semibold">28. Asigna</label>
                    <input type="time" step="1" name="asigna" class="form-control" required>
                </div>

                <div class="col-md-3 col-6">
                    <label class="form-label small fw-semibold">29. Confirma</label>
                    <input type="time" step="1" name="confirma" class="form-control" required>
                </div>

                <div class="col-md-3 col-6">
                    <label class="form-label small fw-semibold">30. LLega</label>
                    <input type="time" step="1" name="llega" class="form-control" required>
                </div>

                <div class="col-md-3 col-6">
                    <label class="form-label small fw-semibold">31. Termino</label>
                    <input type="time" step="1" name="termino" class="form-control" required>
                </div>
            </div>

            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-submit btn-lg rounded-pill shadow-sm">Guardar Registro en MARA</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Configura la fecha de hoy por defecto
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
    });

    // Procesar envío y forzar mayúsculas en los inputs correspondientes antes de enviar por AJAX
    const form = document.getElementById('formularioSiniestros');
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Forzar mayúsculas en el backend de los inputs text antes de recolectar datos
        document.querySelectorAll('.uppercase-input').forEach(input => {
            input.value = input.value.toUpperCase().trim();
        });

        const btn = form.querySelector('.btn-submit');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = 'Guardando...';

        fetch(form.action, {
            method: 'POST',
            body: new FormData(form)
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                alert('¡Siniestro guardado con éxito!');
                form.reset();
                document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
            } else {
                alert('Hubo un problema al guardar.');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('¡Registro enviado con éxito!');
            form.reset();
            document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = originalText;
        });
    });
</script>
</body>
</html>
